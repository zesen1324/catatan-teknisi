<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catatan Teknisi</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  margin: 0;
  padding: 10px;
}
.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 15px;
  border-radius: 10px;
}
input, select, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}
button {
  background: #28a745;
  color: white;
  border: none;
  border-radius: 5px;
}
.item {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}
.hapus {
  background: red;
  padding: 5px;
}
.total {
  font-weight: bold;
}
</style>
</head>

<body>
<div class="container">
  <h3>💰 Catatan Teknisi</h3>

  <div class="total">Hari Ini: Rp <span id="total">0</span></div>
  <div class="total">Bulan Ini: Rp <span id="totalBulanan">0</span></div>

  <input id="nama" placeholder="Nama Pelanggan">

  <select id="service">
    <option value="">Pilih Service</option>
    <option>Printer</option>
    <option>Komputer</option>
    <option>Install</option>
    <option>Lainnya</option>
  </select>

  <input id="keterangan" placeholder="Keterangan (jika lainnya)">
  <input id="biaya" type="number" placeholder="Biaya">

  <button id="btnSimpan" onclick="tambah()">Simpan</button>
  <button onclick="hapusTerpilih()">🗑️ Hapus Terpilih</button>
  <button onclick="exportExcel()">📊 Excel</button>
  <button onclick="exportPDF()">📄 PDF</button>

  <div id="list"></div>
</div>

<!-- LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf/dist/jspdf.umd.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD25yifoIuCrqXVKEx7NvALoAJ8PNb8pDg",
  authDomain: "catatan-teknisi-50aef.firebaseapp.com",
  projectId: "catatan-teknisi-50aef",
  storageBucket: "catatan-teknisi-50aef.firebasestorage.app",
  messagingSenderId: "172857160604",
  appId: "1:172857160604:web:8e94e98ca0e7e28309ce59"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function today() {
  return new Date().toISOString().split("T")[0];
}

// LOAD DATA
async function loadData() {
  const querySnapshot = await getDocs(collection(db, "data"));

  let totalHarian = 0;
  let totalBulanan = 0;
  let html = "";

  const todayDate = today();
  const bulanIni = todayDate.substring(0, 7);

  querySnapshot.forEach((docSnap) => {
    const d = docSnap.data();

    let namaService = d.service === "Lainnya" ? d.keterangan : d.service;

    if (d.tanggal.startsWith(bulanIni)) {
      totalBulanan += d.biaya;
    }

    if (d.tanggal === todayDate) {
      totalHarian += d.biaya;

      html += `
        <div class="item">
          <input type="checkbox" class="cek" value="${docSnap.id}">
          ${d.nama} - ${namaService} - Rp ${d.biaya.toLocaleString()}
          <button class="hapus" onclick="hapus('${docSnap.id}')">X</button>
        </div>
      `;
    }
  });

  document.getElementById("list").innerHTML = html;
  document.getElementById("total").innerText = totalHarian.toLocaleString();
  document.getElementById("totalBulanan").innerText = totalBulanan.toLocaleString();
}

// TAMBAH
window.tambah = async function() {
  let nama = document.getElementById("nama").value;
  let service = document.getElementById("service").value;
  let ket = document.getElementById("keterangan").value;
  let biaya = parseInt(document.getElementById("biaya").value);

  if (!nama || !service || !biaya) return alert("Isi semua!");
  if (service === "Lainnya" && !ket) return alert("Isi keterangan!");

  let btn = document.getElementById("btnSimpan");
  btn.innerText = "Menyimpan...";
  btn.disabled = true;

  setTimeout(async () => {
    try {
      await addDoc(collection(db, "data"), {
        nama,
        service,
        keterangan: ket || "",
        biaya,
        tanggal: today()
      });

      alert("✅ Tersimpan");

    } catch (e) {
      alert("❌ Gagal: " + e.message);
    }

    document.getElementById("nama").value = "";
    document.getElementById("service").value = "";
    document.getElementById("keterangan").value = "";
    document.getElementById("biaya").value = "";

    btn.innerText = "Simpan";
    btn.disabled = false;
    document.getElementById("nama").focus();

    loadData();
  }, 3000);
};

// HAPUS SATU
window.hapus = async function(id) {
  if (!confirm("Yakin hapus?")) return;
  await deleteDoc(doc(db, "data", id));
  loadData();
};

// HAPUS TERPILIH
window.hapusTerpilih = async function() {
  const checks = document.querySelectorAll(".cek:checked");

  if (checks.length === 0) return alert("Pilih data dulu!");
  if (!confirm("Yakin hapus terpilih?")) return;

  for (let c of checks) {
    await deleteDoc(doc(db, "data", c.value));
  }

  alert("✅ Dihapus");
  loadData();
};

// EXPORT EXCEL
window.exportExcel = async function() {
  const querySnapshot = await getDocs(collection(db, "data"));
  let data = [];

  querySnapshot.forEach((docSnap) => {
    const d = docSnap.data();
    let namaService = d.service === "Lainnya" ? d.keterangan : d.service;

    data.push({
      Tanggal: d.tanggal,
      Nama: d.nama,
      Service: namaService,
      Biaya: d.biaya
    });
  });

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Laporan");
  XLSX.writeFile(wb, "laporan.xlsx");
};

// EXPORT PDF
window.exportPDF = async function() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  const querySnapshot = await getDocs(collection(db, "data"));
  let y = 10;
  let total = 0;

  pdf.text("Laporan Teknisi", 10, y);
  y += 10;

  querySnapshot.forEach((docSnap) => {
    const d = docSnap.data();
    let namaService = d.service === "Lainnya" ? d.keterangan : d.service;

    total += d.biaya;

    pdf.text(`${d.tanggal} | ${d.nama} | ${namaService} | Rp ${d.biaya}`, 10, y);
    y += 8;

    if (y > 280) {
      pdf.addPage();
      y = 10;
    }
  });

  y += 10;
  pdf.text(`TOTAL: Rp ${total}`, 10, y);
  pdf.save("laporan.pdf");
};

// ENTER = SIMPAN
document.getElementById("biaya").addEventListener("keypress", function(e) {
  if (e.key === "Enter") tambah();
});

// AUTO FOCUS
document.getElementById("nama").focus();

// LOAD AWAL
loadData();
</script>
</body>
</html>
