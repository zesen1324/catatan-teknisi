<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan Pendapatan - Catatan Teknisi</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

:root {
  --primary: #0891b2;
  --primary-dark: #0e7490;
  --primary-light: #22d3ee;
  --accent: #f59e0b;
  --success: #059669;
  --danger: #dc2626;
  --purple: #7c3aed;
  
  /* Light Theme - Sama seperti index.html */
  --bg-body: #f0f4f8;
  --bg-card: #ffffff;
  --bg-input: #f8fafc;
  --border: #e2e8f0;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
  background: var(--bg-body);
  min-height: 100vh;
  padding: 16px;
  color: var(--text-primary);
  position: relative;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ============================================== */
/* ============ CIRCUIT BOARD BACKGROUND (SAMA) == */
/* ============================================== */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(180deg, #e8f4f8 0%, #f0f4f8 30%, #f8fafb 70%, #eef2f7 100%);
  z-index: -2;
}

body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: -1;
  opacity: 0.4;
  background-image: 
    linear-gradient(90deg, transparent 49.5%, rgba(8, 145, 178, 0.25) 49.5%, rgba(8, 145, 178, 0.25) 50.5%, transparent 50.5%),
    linear-gradient(90deg, transparent 19.5%, rgba(8, 145, 178, 0.15) 19.5%, rgba(8, 145, 178, 0.15) 20.5%, transparent 20.5%),
    linear-gradient(90deg, transparent 79.5%, rgba(8, 145, 178, 0.15) 79.5%, rgba(8, 145, 178, 0.15) 80.5%, transparent 80.5%),
    linear-gradient(0deg, transparent 29.5%, rgba(8, 145, 178, 0.18) 29.5%, rgba(8, 145, 178, 0.18) 30.5%, transparent 30.5%),
    linear-gradient(0deg, transparent 69.5%, rgba(8, 145, 178, 0.18) 69.5%, rgba(8, 145, 178, 0.18) 70.5%, transparent 70.5%),
    linear-gradient(45deg, transparent 48%, rgba(124, 58, 237, 0.12) 48%, rgba(124, 58, 237, 0.12) 52%, transparent 52%),
    linear-gradient(135deg, transparent 48%, rgba(8, 145, 178, 0.1) 48%, rgba(8, 145, 178, 0.1) 52%, transparent 52%),
    linear-gradient(60deg, transparent 88%, rgba(8, 145, 178, 0.12) 88%, rgba(8, 145, 178, 0.12) 92%, transparent 92%),
    linear-gradient(-45deg, transparent 85%, rgba(124, 58, 237, 0.1) 85%, rgba(124, 58, 237, 0.1) 89%, transparent 89%),
    radial-gradient(circle at center, rgba(8, 145, 178, 0.2) 1px, transparent 1px);
  
  background-size: 120px 80px, 80px 40px, 80px 40px, 60px 100px, 60px 100px, 200px 150px, 180px 140px, 160px 200px, 140px 180px, 24px 24px;
  background-position: 0 0, 0 20px, 0 60px, 30px 0, 30px 50px, -20px -30px, 100% 10%, 10% 100%, 90% 85%, 0 0;
  animation: circuitPulse 8s ease-in-out infinite alternate;
}

@keyframes circuitPulse {
  0% { opacity: 0.35; }
  100% { opacity: 0.55; }
}

/* IC Chips */
.ic-chip {
  position: fixed;
  z-index: -1;
  opacity: 0.25;
  filter: drop-shadow(0 0 8px rgba(8, 145, 178, 0.3));
}
.ic-chip.top-right {
  top: 8%; right: -20px;
  width: 100px; height: 60px;
  transform: rotate(-5deg);
  animation: icGlow 4s ease-in-out infinite alternate;
}
.ic-chip.bottom-left {
  bottom: 15%; left: -30px;
  width: 120px; height: 70px;
  transform: rotate(12deg);
  animation: icGlow 5s ease-in-out infinite alternate-reverse;
}

@keyframes icGlow {
  0% { opacity: 0.2; filter: drop-shadow(0 0 5px rgba(8, 145, 178, 0.2)); }
  100% { opacity: 0.35; filter: drop-shadow(0 0 15px rgba(8, 145, 178, 0.4)); }
}

/* Circuit Nodes */
.circuit-node {
  position: fixed;
  width: 12px; height: 12px;
  border-radius: 50%;
  z-index: -1;
  animation: nodeBlink 3s ease-in-out infinite;
}
.circuit-node.n1 { top: 25%; left: 8%; background: radial-gradient(circle, var(--primary-light), var(--primary)); box-shadow: 0 0 12px rgba(34, 211, 238, 0.5); animation-delay: 0s; }
.circuit-node.n2 { top: 60%; right: 12%; background: radial-gradient(circle, var(--purple), #a78bfa); box-shadow: 0 0 12px rgba(167, 139, 250, 0.5); animation-delay: 1s; }
.circuit-node.n3 { bottom: 20%; left: 15%; background: radial-gradient(circle, var(--accent), #fcd34d); box-shadow: 0 0 12px rgba(245, 158, 11, 0.5); animation-delay: 2s; }
.circuit-node.n4 { top: 15%; left: 45%; width: 8px; height: 8px; background: var(--success); box-shadow: 0 0 8px rgba(5, 150, 105, 0.5); animation-delay: 0.5s; }

@keyframes nodeBlink {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.3); opacity: 1; }
}

/* Data Particles */
.data-particle {
  position: fixed;
  width: 4px; height: 4px;
  background: var(--primary-light);
  border-radius: 50%;
  z-index: -1;
  box-shadow: 0 0 6px var(--primary-light);
  animation: dataFlow 6s linear infinite;
}
.data-particle.p1 { top: 20%; left: 0; animation-delay: 0s; }
.data-particle.p2 { top: 50%; left: 0; animation-delay: 2s; }
.data-particle.p3 { top: 80%; left: 0; animation-delay: 4s; }

@keyframes dataFlow {
  0% { transform: translateX(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateX(100vw); opacity: 0; }
}

.container { max-width: 520px; margin: 0 auto; position: relative; z-index: 1; }

/* ============ HEADER (SAMA STYLE) ============ */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 0 28px;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.back-btn {
  width: 46px; height: 46px;
  border-radius: 14px;
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s ease;
  flex-shrink: 0;
  text-decoration: none;
}
.back-btn:hover {
  background: linear-gradient(135deg, rgba(8,145,178,0.1), rgba(124,58,237,0.1));
  color: var(--primary);
  border-color: var(--primary);
  transform: translateX(-3px);
  box-shadow: 0 0 15px rgba(8,145,178,0.15);
}
.header-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light), var(--purple));
  padding: 3px;
  box-shadow: 0 6px 20px rgba(8, 145, 178, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.header-icon-inner {
  width: 100%; height: 100%;
  background: white;
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.header-icon-inner img {
  width: 85%; height: 85%;
  object-fit: contain;
}
.header-info h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; color: var(--text-primary); }
.header-info p { color: var(--text-muted); font-size: 13px; font-weight: 500; }

/* Menu Button */
.menu-container { position: relative; }
.menu-btn {
  width: 44px; height: 44px;
  border-radius: 14px;
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s ease;
}
.menu-btn:hover { 
  background: linear-gradient(135deg, rgba(8,145,178,0.1), rgba(124,58,237,0.1)); 
  color: var(--primary); 
  border-color: var(--primary); 
}
.menu-btn.active { background: var(--bg-input); border-color: var(--primary); color: var(--primary); }

.dropdown-menu {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  min-width: 220px;
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  overflow: hidden;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-10px) scale(0.95);
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 100;
}
.dropdown-menu.show {
  opacity: 1;
  visibility: visible;
  transform: translateY(0) scale(1);
}
.dropdown-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s ease;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: inherit;
}
.dropdown-item:hover { background: var(--bg-input); color: var(--text-primary); }
.dropdown-item svg { width: 18px; height: 18px; flex-shrink: 0; stroke-width: 2; }
.dropdown-item.print svg { color: var(--primary); }
.dropdown-item.share svg { color: var(--success); }
.dropdown-item.export svg { color: var(--purple); }
.dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }

/* ============ STATS GRID (LIGHT THEME) ============ */
.stats-grid { 
  display: grid; 
  grid-template-columns: repeat(3, 1fr); 
  gap: 12px; 
  margin-bottom: 20px; 
}
.stat-card {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 18px 14px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.stat-card.today::before { background: linear-gradient(90deg, var(--success), #34d399); }
.stat-card.week::before { background: linear-gradient(90deg, var(--primary), var(--primary-light)); }
.stat-card.month::before { background: linear-gradient(90deg, var(--purple), #a78bfa); }
.stat-card:hover { 
  transform: translateY(-4px); 
  box-shadow: 0 8px 24px rgba(0,0,0,0.08); 
  border-color: var(--primary);
}
.stat-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 10px;
  font-size: 17px;
}
.stat-card.today .stat-icon { background: linear-gradient(135deg, #d1fae5, #a7f3d0); }
.stat-card.week .stat-icon { background: linear-gradient(135deg, #cffafe, #a5f3fc); }
.stat-card.month .stat-icon { background: linear-gradient(135deg, #ede9fe, #ddd6fe); }
.stat-label { 
  font-size: 11px; 
  color: var(--text-muted); 
  font-weight: 700; 
  text-transform: uppercase; 
  letter-spacing: 0.5px; 
  margin-bottom: 6px; 
}
.stat-value { 
  font-size: 17px; 
  font-weight: 800; 
}
.stat-card.today .stat-value { color: var(--success); }
.stat-card.week .stat-value { color: var(--primary); }
.stat-card.month .stat-value { color: var(--purple); }

/* ============ FILTER SECTION ============ */
.filter-section {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 18px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.filter-label { 
  font-size: 12px; 
  font-weight: 700; 
  color: var(--text-secondary); 
  display: flex; 
  align-items: center; 
  gap: 5px; 
}
.filter-label svg { width: 14px; height: 14px; stroke: var(--primary); }
.filter-btn {
  padding: 7px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s ease;
}
.filter-btn:hover { 
  border-color: var(--primary); 
  color: var(--primary); 
  background: rgba(8,145,178,0.05);
}
.filter-btn.active { 
  background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
  border-color: var(--primary); 
  color: white; 
  box-shadow: 0 4px 12px rgba(8,145,178,0.25);
}

/* ============ SUMMARY BAR ============ */
.summary-bar {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 18px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.summary-text { font-size: 13px; color: var(--text-secondary); }
.summary-text strong { color: var(--text-primary); font-weight: 700; }
.summary-total { 
  font-size: 17px; 
  font-weight: 800; 
  color: var(--accent); 
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ============ LIST HEADER ============ */
.list-header { 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
  margin-bottom: 12px; 
  padding: 0 2px; 
}
.list-title { 
  font-size: 15px; 
  font-weight: 700; 
  color: var(--text-secondary); 
  display: flex; 
  align-items: center; 
  gap: 8px; 
}
.list-title svg { stroke: var(--text-muted); }
.transaction-count {
  background: var(--bg-input);
  padding: 4px 12px;
  border-radius: 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
}

/* ============ TRANSACTION LIST ============ */
.transaction-list {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  max-height: 480px;
  overflow-y: auto;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.transaction-item {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
  transition: all 0.2s ease;
  animation: fadeInUp 0.3s ease backwards;
}
@keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.transaction-item:last-child { border-bottom: none; }
.transaction-item:hover { 
  background: linear-gradient(135deg, rgba(8,145,178,0.03), rgba(124,58,237,0.03)); 
  border-left: 3px solid var(--primary);
  padding-left: 15px;
}
.txn-date {
  background: linear-gradient(135deg, var(--bg-input), #f1f5f9);
  padding: 8px 10px;
  border-radius: 10px;
  text-align: center;
  flex-shrink: 0;
  min-width: 52px;
  border: 1px solid var(--border);
}
.txn-day { font-size: 18px; font-weight: 800; color: var(--text-primary); line-height: 1; }
.txn-month { font-size: 9px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-top: 2px; letter-spacing: 0.3px; }
.txn-info { flex: 1; min-width: 0; }
.txn-name { font-weight: 700; font-size: 14px; color: var(--text-primary); margin-bottom: 3px; }
.txn-service { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.service-badge { 
  padding: 2px 8px; 
  border-radius: 6px; 
  font-size: 10px; 
  font-weight: 700; 
}
.badge-printer { background: linear-gradient(135deg, #dbeafe, #bfdbfe); color: #2563eb; }
.badge-komputer { background: linear-gradient(135deg, #ede9fe, #ddd6fe); color: #7c3aed; }
.badge-install { background: linear-gradient(135deg, #d1fae5, #a7f3d0); color: #059669; }
.badge-lainnya { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #d97706; }
.txn-amount { 
  font-weight: 800; 
  font-size: 14px; 
  color: var(--success); 
  white-space: nowrap; 
}

/* Empty State */
.empty-state { 
  text-align: center; 
  padding: 50px 24px; 
  color: var(--text-muted); 
}
.empty-icon { 
  font-size: 56px; 
  margin-bottom: 14px; 
  opacity: 0.35; 
}
.empty-state p { 
  font-size: 14px; 
  font-weight: 500;
}
.loading { 
  text-align: center; 
  padding: 44px; 
  color: var(--text-muted); 
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ==================== MODAL (LIGHT THEME) ==================== */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(6px);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}
.modal-overlay.show { opacity: 1; visibility: visible; }
.modal-overlay.show .modal-box { transform: translateY(0) scale(1); opacity: 1; }

.modal-box {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 420px;
  padding: 26px;
  transform: translateY(30px) scale(0.92);
  opacity: 0;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 25px 50px rgba(0,0,0,0.15);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
  padding-bottom: 14px;
  border-bottom: 1px dashed rgba(8,145,178,0.2);
}
.modal-title { 
  font-size: 16px; 
  font-weight: 800; 
  display: flex; 
  align-items: center; 
  gap: 10px; 
  color: var(--primary-dark);
}
.modal-title svg { stroke: var(--primary); }
.modal-close {
  width: 34px; height: 34px;
  border-radius: 10px;
  background: var(--bg-input);
  border: 1.5px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}
.modal-close:hover { 
  background: #fef2f2; 
  color: var(--danger); 
  border-color: #fecaca; 
}

.date-group { margin-bottom: 14px; }
.date-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
.date-label svg { width: 12px; height: 12px; stroke: var(--primary); margin-right: 4px; }
.date-input {
  width: 100%;
  padding: 13px 16px;
  background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
  border: 1.8px solid #cbd5e1;
  border-radius: 11px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text-primary);
  transition: all 0.25s ease;
  cursor: pointer;
  outline: none;
}
.date-input:focus { 
  border-color: var(--primary); 
  box-shadow: 0 0 0 4px rgba(8, 145, 178, 0.1); 
}
.date-input::-webkit-calendar-picker-indicator { opacity: 0.6; cursor: pointer; }

.arrow-icon {
  display: flex;
  justify-content: center;
  padding: 2px 0;
  color: var(--text-muted);
}

.quick-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
  margin-bottom: 18px;
}
.quick-btn {
  padding: 7px 13px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s ease;
}
.quick-btn:hover { 
  border-color: var(--primary); 
  color: var(--primary); 
  background: rgba(8,145,178,0.05); 
}
.quick-btn.active { 
  background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
  border-color: var(--primary); 
  color: white; 
  box-shadow: 0 4px 10px rgba(8,145,178,0.25);
}

.preview-box {
  background: linear-gradient(135deg, var(--bg-input), #f1f5f9);
  border-radius: var(--radius-md);
  padding: 16px;
  margin-bottom: 18px;
  border: 1.5px solid var(--border);
}
.preview-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 12px;
}
.preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.preview-item { text-align: center; }
.preview-item-label { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }
.preview-item-value { font-size: 18px; font-weight: 800; color: var(--primary); }

.modal-footer { display: flex; gap: 10px; }
.btn-modal {
  flex: 1;
  padding: 13px 18px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: none;
}
.btn-cancel {
  background: var(--bg-input);
  border: 1.5px solid var(--border);
  color: var(--text-secondary);
}
.btn-cancel:hover { background: var(--border); color: var(--text-primary); }
.btn-process {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: 0 4px 16px rgba(8, 145, 178, 0.3);
}
.btn-process:hover:not(:disabled) { 
  transform: translateY(-2px); 
  box-shadow: 0 8px 24px rgba(8, 145, 178, 0.4); 
}
.btn-process:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(120px);
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  padding: 13px 22px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  font-size: 13px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  z-index: 99999;
  opacity: 0;
  transition: all 0.35s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: var(--text-primary);
  max-width: 90vw;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.success { border-left: 4px solid var(--success); }
.toast.error { border-left: 4px solid var(--danger); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

@media print {
  body { background: white !important; color: black !important; padding: 20px; }
  body::before, .ic-chip, .circuit-node, .data-particle, .back-btn, .menu-container, .filter-section, .summary-bar, .modal-overlay { display: none !important; }
  .container { max-width: 100%; }
  .header { justify-content: center; padding-bottom: 20px; }
  .stats-grid { grid-template-columns: repeat(3, 1fr); break-inside: avoid; }
  .stat-card { border: 1px solid #ddd; background: #f9f9f9; }
  .transaction-list { max-height: none; border: 1px solid #ddd; }
  .transaction-item { break-inside: avoid; }
  * { color-adjust: exact !important; -webkit-print-color-adjust: exact !important; }
}

@media (max-width: 520px) {
  body { padding: 10px; }
  .header { padding: 18px 0 22px; }
  .header-info h1 { font-size: 19px; }
  .stats-grid { grid-template-columns: 1fr; gap: 10px; }
  .stat-card { display: flex; align-items: center; text-align: left; padding: 14px; }
  .stat-icon { margin: 0 14px 0 0; }
  .stat-label { margin-bottom: 2px; }
  .filter-section { justify-content: center; }
  .summary-bar { flex-direction: column; gap: 8px; text-align: center; }
  .transaction-item { flex-wrap: wrap; }
  .txn-amount { width: 100%; text-align: right; padding-top: 8px; border-top: 1px dashed var(--border); }
  .modal-box { padding: 20px; }
  .preview-grid { grid-template-columns: 1fr 1fr; }
  .ic-chip { display: none; }
  .circuit-node.n1, .circuit-node.n2 { display: none; }
}
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase Init (sama config)
const firebaseConfig = {
  apiKey: "AIzaSyD25yifoIuCrqXVKEx7NvALoAJ8PNb8pDg",
  authDomain: "catatan-teknisi-50aef.firebaseapp.com",
  projectId: "catatan-teknisi-50aef",
  storageBucket: "catatan-teknisi-50aef.firebasestorage.app",
  messagingSenderId: "172857160604",
  appId: "1:172857160604:web:8e94e98ca0e7e28309ce59"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Global State
let allData = [];
let currentFilter = 'all';
let pendingAction = null;

// ==================== UTILITIES ====================

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtRupiah(n) {
  return new Intl.NumberFormat('id-ID', {minimumFractionDigits:0, maximumFractionDigits:0}).format(n);
}

function fmtDateID(str) {
  const [y,m,d] = str.split('-');
  return new Date(y, m-1, d).toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
}

function fmtDateShort(str) {
  const [y,m,d] = str.split('-');
  return new Date(y, m-1, d).toLocaleDateString('id-ID', {day:'numeric', month:'short'});
}

function badgeClass(s) {
  return {'Printer':'badge-printer','Komputer':'badge-komputer','Install':'badge-install','Lainnya':'badge-lainnya'}[s]||'badge-lainnya';
}

function getServiceName(item) {
  return item.service === 'Lainnya' ? (item.keterangan || 'Lainnya') : item.service;
}

function isInRange(dateStr, range) {
  const d = new Date(dateStr+'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  if(range==='today') return dateStr === getTodayStr();
  if(range==='week'){ const s=new Date(now); s.setDate(now.getDate()-now.getDay()+(now.getDay()===0?-6:1)); return d>=s; }
  if(range==='month') return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  return true;
}

function filterByRange(data, start, end) {
  return data.filter(x => x.tanggal >= start && x.tanggal <= end);
}

// ==================== TOAST ====================

function showToast(msg, type='success') {
  const toast = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = type==='success'?'✅':'❌';
  document.getElementById('toastMsg').textContent = msg;
  toast.className = `toast show ${type}`;
  setTimeout(() => toast.classList.remove('show'), 3000);
}
window.showToast = showToast;

// ==================== DROPDOWN MENU ====================

window.toggleDropdown = function() {
  const btn = document.getElementById('btnMenu');
  const menu = document.getElementById('dropdownMenu');
  const isOpen = menu.classList.contains('show');
  closeDropdown();
  if(!isOpen) { btn.classList.add('active'); menu.classList.add('show'); }
};

function closeDropdown() {
  document.getElementById('btnMenu').classList.remove('active');
  document.getElementById('dropdownMenu').classList.remove('show');
}

document.addEventListener('click', e => {
  if(!document.querySelector('.menu-container').contains(e.target)) closeDropdown();
});

// ==================== MODAL LOGIC ====================

window.openDateModal = function(action) {
  pendingAction = action;
  closeDropdown();
  
  const titles = {'print':'🖨️ Cetak Laporan','share':'📤 Bagikan Laporan','csv':'📥 Export CSV','json':'📄 Export JSON'};
  document.getElementById('modalTitle').innerHTML = `
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    ${titles[action]||'Pilih Rentang'}
  `;
  
  selectQuickRange(document.querySelector('[data-range="month"]'));
  document.getElementById('dateModal').classList.add('show');
};

window.closeDateModal = function() {
  document.getElementById('dateModal').classList.remove('show');
  pendingAction = null;
};

window.selectQuickRange = function(btn) {
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  const range = btn.dataset.range;
  const today = new Date();
  let start, end;
  
  switch(range) {
    case 'today': start = end = today; break;
    case 'week':
      start = new Date(today);
      start.setDate(today.getDate()-today.getDay()+(today.getDay()===0?-6:1));
      end = today;
      break;
    case 'month':
      start = new Date(today.getFullYear(), today.getMonth(), 1);
      end = today;
      break;
    case 'lastmonth':
      start = new Date(today.getFullYear(), today.getMonth()-1, 1);
      end = new Date(today.getFullYear(), today.getMonth(), 0);
      break;
    case 'all':
      if(allData.length > 0) {
        const dates = allData.map(d=>d.tanggal).sort();
        start = new Date(dates[0]+'T00:00:00');
        end = new Date(dates[dates.length-1]+'T00:00:00');
      } else { start = end = today; }
      break;
    default: start = end = today;
  }
  
  const toStr = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  document.getElementById('inputStartDate').value = toStr(start);
  document.getElementById('inputEndDate').value = toStr(end);
  updatePreview();
};

document.getElementById('inputStartDate').addEventListener('change', updatePreview);
document.getElementById('inputEndDate').addEventListener('change', updatePreview);

function updatePreview() {
  const start = document.getElementById('inputStartDate').value;
  const end = document.getElementById('inputEndDate').value;
  if(!start || !end) {
    document.getElementById('previewCount').textContent = '-';
    document.getElementById('previewTotal').textContent = '-';
    return;
  }
  const filtered = filterByRange(allData, start, end);
  const total = filtered.reduce((s,x)=>s+x.biaya, 0);
  document.getElementById('previewCount').textContent = filtered.length;
  document.getElementById('previewTotal').textContent = `Rp ${fmtRupiah(total)}`;
}

window.executeAction = async function() {
  const start = document.getElementById('inputStartDate').value;
  const end = document.getElementById('inputEndDate').value;
  if(!start || !end) { showToast('Mohon pilih tanggal mulai & akhir!', 'error'); return; }
  if(start > end) { showToast('Tanggal mulai tidak boleh lebih besar!', 'error'); return; }
  const filtered = filterByRange(allData, start, end);
  if(filtered.length === 0) { showToast('Tidak ada data pada rentang ini!', 'error'); return; }
  closeDateModal();
  setTimeout(async () => {
    switch(pendingAction) {
      case 'print': await doPrint(filtered, start, end); break;
      case 'share': await doShare(filtered, start, end); break;
      case 'csv': await doExportCSV(filtered, start, end); break;
      case 'json': await doExportJSON(filtered, start, end); break;
    }
  }, 300);
};

// ==================== ACTIONS ====================

async function doShare(data, start, end) {
  const total = data.reduce((s,x)=>s+x.biaya,0);
  const periode = `${fmtDateShort(start)} - ${fmtDateShort(end)}`;
  let txt = `📊 *LAPORAN PENDAPATAN TEKNISI*\n`;
  txt += `━━━━━━━━━━━━━━━━\n`;
  txt += `📅 Periode: ${periode}\n`;
  txt += `📝 Jumlah: ${data.length} transaksi\n`;
  txt += `💰 Total: Rp ${fmtRupiah(total)}\n`;
  txt += `━━━━━━━━━━━━━━━━\n\n`;
  data.slice(0,15).forEach((item,i) => { txt += `${i+1}. ${item.nama} - ${getServiceName(item)} (Rp ${fmtRupiah(item.biaya)})\n`; });
  if(data.length > 15) txt += `\n...dan ${data.length-15} transaksi lainnya`;
  try { if(navigator.share) await navigator.share({title:`Laporan (${periode})`, text:txt}); else throw new Error('no share'); }
  catch(e) { await navigator.clipboard.writeText(txt); showToast('Laporan disalin ke clipboard!'); }
}

async function doExportCSV(data, start, end) {
  const hdr = ['No','Tanggal','Pelanggan','Service','Keterangan','Biaya'];
  const rows = data.map((item,i) => [i+1,item.tanggal,item.nama,item.service,item.keterangan||'-',item.biaya]);
  const csv = [hdr,...rows].map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  downloadFile(csv, `laporan-${start}_${end}.csv`, 'text/csv');
  showToast('File CSV berhasil didownload!');
}

async function doExportJSON(data, start, end) {
  const total = data.reduce((s,x)=>s+x.biaya,0);
  const json = {
    meta:{title:'Laporan Pendapatan Teknisi',periode:{start,end},generatedAt:new Date().toISOString()},
    summary:{count:data.length,total,totalFmt:`Rp ${fmtRupiah(total)}`},
    transactions:data.map((item,i)=>({no:i+1,tanggal:item.tanggal,pelanggan:item.nama,service:item.service,keterangan:item.keterangan||null,biaya:item.biaya,biayaFmt:`Rp ${fmtRupiah(item.biaya)}`}))
  };
  downloadFile(JSON.stringify(json,null,2), `laporan-${start}_${end}.json`, 'application/json');
  showToast('File JSON berhasil didownload!');
}

function downloadFile(content, filename, mime) {
  const blob = new Blob(['\ufeff'+content], {type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename; a.style.display='none';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

document.getElementById('dateModal').addEventListener('click', e => { if(e.target.id==='dateModal') closeDateModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeDateModal(); });

// ==================== LIST RENDERING ====================

window.setFilter = function(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.f===f));
  renderList();
};

function renderList() {
  const filtered = allData.filter(x => isInRange(x.tanggal, currentFilter));
  const total = filtered.reduce((s,x)=>s+x.biaya,0);
  document.getElementById('showCount').textContent = filtered.length;
  document.getElementById('summaryTotal').textContent = `Rp ${fmtRupiah(total)}`;
  const container = document.getElementById('transactionList');
  if(filtered.length===0) { container.innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><p>Tidak ada transaksi</p></div>`; return; }
  filtered.sort((a,b) => b.tanggal.localeCompare(a.tanggal));
  container.innerHTML = filtered.map((item,i) => {
    const [y,m,d] = item.tanggal.split('-');
    const dt = new Date(y,m-1,d);
    return `<div class="transaction-item" style="animation-delay:${Math.min(i*0.03,0.3)}s">
      <div class="txn-date"><div class="txn-day">${dt.getDate()}</div><div class="txn-month">${dt.toLocaleDateString('id-ID',{month:'short'})}</div></div>
      <div class="txn-info"><div class="txn-name">${item.nama}</div><div class="txn-service"><span class="service-badge ${badgeClass(item.service)}">${getServiceName(item)}</span></div></div>
      <div class="txn-amount">Rp ${fmtRupiah(item.biaya)}</div>
    </div>`;
  }).join('');
}

// ==================== LOAD DATA ====================

async function loadReport() {
  try {
    const snap = await getDocs(collection(db,'data'));
    allData = [];
    let tToday=0, tWeek=0, tMonth=0;
    const now = new Date();
    const sDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const sWeek = new Date(now); sWeek.setDate(now.getDate()-now.getDay()+(now.getDay()===0?-6:1)); sWeek.setHours(0,0,0,0);
    const sMonth = new Date(now.getFullYear(), now.getMonth(), 1);
    
    snap.forEach(doc => {
      const d = doc.data();
      allData.push({nama:d.nama, service:d.service, keterangan:d.keterangan, biaya:d.biaya, tanggal:d.tanggal});
      const td = new Date(d.tanggal+'T00:00:00');
      if(td>=sDay && d.tanggal===getTodayStr()) tToday+=d.biaya;
      if(td>=sWeek) tWeek+=d.biaya;
      if(td>=sMonth) tMonth+=d.biaya;
    });
    
    document.getElementById('statToday').textContent = `Rp ${fmtRupiah(tToday)}`;
    document.getElementById('statWeek').textContent = `Rp ${fmtRupiah(tWeek)}`;
    document.getElementById('statMonth').textContent = `Rp ${fmtRupiah(tMonth)}`;
    document.getElementById('totalCount').textContent = `${allData.length} total`;
    renderList();
  } catch(e) {
    console.error(e);
    document.getElementById('transactionList').innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><p>Gagal memuat data</p></div>`;
  }
}

loadReport();
