<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan Pendapatan - Catatan Teknisi</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

:root {
  --primary: #0d9488;
  --primary-dark: #0f766e;
  --primary-light: #14b8a6;
  --accent: #f59e0b;
  --success: #10b981;
  --purple: #8b5cf6;
  --blue: #3b82f6;
  --danger: #ef4444;
  --bg-main: #0c1222;
  --bg-card: #151d2e;
  --bg-card-hover: #1a2540;
  --bg-input: #0f172a;
  --border: #1e293b;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.5);
  --radius-md: 16px;
  --radius-lg: 24px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg-main);
  min-height: 100vh;
  padding: 16px;
  color: var(--text-primary);
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: 
    radial-gradient(ellipse at 20% 0%, rgba(139, 92, 246, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(13, 148, 136, 0.1) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.3;
  animation: float 25s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}

.orb-1 {
  width: 350px;
  height: 350px;
  background: linear-gradient(135deg, var(--purple), transparent);
  top: -120px;
  right: -120px;
}

.orb-2 {
  width: 280px;
  height: 280px;
  background: linear-gradient(135deg, var(--primary), transparent);
  bottom: -100px;
  left: -100px;
  animation-delay: -10s;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -30px) scale(1.05); }
  66% { transform: translate(-20px, 20px) scale(0.95); }
}

.container {
  max-width: 640px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 0 28px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.back-btn {
  width: 46px;
  height: 46px;
  border-radius: 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s ease;
  flex-shrink: 0;
  text-decoration: none;
}

.back-btn:hover {
  background: var(--bg-card-hover);
  color: var(--text-primary);
  border-color: var(--primary);
  transform: translateX(-3px);
}

.header-info h1 {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}

.header-info p {
  color: var(--text-muted);
  font-size: 14px;
}

/* Three Dots Menu */
.menu-container {
  position: relative;
}

.menu-btn {
  width: 44px;
  height: 44px;
  border-radius: 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s ease;
}

.menu-btn:hover {
  background: var(--bg-card-hover);
  color: var(--text-primary);
  border-color: var(--primary);
}

.menu-btn.active {
  background: var(--bg-card-hover);
  border-color: var(--primary);
  color: var(--primary-light);
}

.dropdown-menu {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  min-width: 220px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  opacity: 0;
  visibility: hidden;
  transform: translateY(-10px) scale(0.95);
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 100;
}

.dropdown-menu.show {
  opacity: 1;
  visibility: visible;
  transform: translateY(0) scale(1);
}

.dropdown-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s ease;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: inherit;
}

.dropdown-item:hover {
  background: var(--bg-input);
  color: var(--text-primary);
}

.dropdown-item svg {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}

.dropdown-item.print svg { color: var(--blue); }
.dropdown-item.share svg { color: var(--success); }
.dropdown-item.export svg { color: var(--purple); }

.dropdown-divider {
  height: 1px;
  background: var(--border);
  margin: 4px 0;
}

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px 16px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
}

.stat-card.today::before { background: linear-gradient(90deg, var(--success), #34d399); }
.stat-card.week::before { background: linear-gradient(90deg, var(--blue), #60a5fa); }
.stat-card.month::before { background: linear-gradient(90deg, var(--purple), #a78bfa); }

.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
}

.stat-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  font-size: 18px;
}

.stat-card.today .stat-icon { background: rgba(16, 185, 129, 0.15); }
.stat-card.week .stat-icon { background: rgba(59, 130, 246, 0.15); }
.stat-card.month .stat-icon { background: rgba(139, 92, 246, 0.15); }

.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.stat-value {
  font-size: 20px;
  font-weight: 800;
}

.stat-card.today .stat-value { color: var(--success); }
.stat-card.week .stat-value { color: var(--blue); }
.stat-card.month .stat-value { color: var(--purple); }

/* Filter Section */
.filter-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px 20px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.filter-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 6px;
}

.filter-btn {
  padding: 8px 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s ease;
}

.filter-btn:hover {
  border-color: var(--primary);
  color: var(--text-primary);
}

.filter-btn.active {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}

/* Summary Bar */
.summary-bar {
  background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-card-hover) 100%);
  border: 1px solid var(--border);
  border-radius: var(--range-md);
  padding: 16px 20px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.summary-text {
  font-size: 14px;
  color: var(--text-secondary);
}

.summary-text strong {
  color: var(--text-primary);
}

.summary-total {
  font-size: 18px;
  font-weight: 800;
  color: var(--accent);
}

/* Transaction List */
.list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding: 0 4px;
}

.list-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.transaction-count {
  background: var(--bg-input);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
}

.transaction-list {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  max-height: 500px;
  overflow-y: auto;
}

.transaction-item {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
  transition: background 0.2s ease;
  animation: fadeInUp 0.3s ease backwards;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.transaction-item:last-child {
  border-bottom: none;
}

.transaction-item:hover {
  background: var(--bg-card-hover);
}

.txn-date {
  background: var(--bg-input);
  padding: 8px 12px;
  border-radius: 10px;
  text-align: center;
  flex-shrink: 0;
  min-width: 56px;
}

.txn-day {
  font-size: 18px;
  font-weight: 800;
  color: var(--text-primary);
  line-height: 1;
}

.txn-month {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  margin-top: 2px;
}

.txn-info {
  flex: 1;
  min-width: 0;
}

.txn-name {
  font-weight: 700;
  font-size: 15px;
  color: var(--text-primary);
  margin-bottom: 3px;
}

.txn-service {
  font-size: 13px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.service-badge {
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
}

.badge-printer { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
.badge-komputer { background: rgba(139, 92, 246, 0.15); color: #a78bfa; }
.badge-install { background: rgba(16, 185, 129, 0.15); color: #34d399; }
.badge-lainnya { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }

.txn-amount {
  font-weight: 800;
  font-size: 15px;
  color: var(--success);
  white-space: nowrap;
}

.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-muted);
}

.empty-icon {
  font-size: 64px;
  margin-bottom: 16px;
  opacity: 0.4;
}

.empty-state p {
  font-size: 15px;
}

.loading {
  text-align: center;
  padding: 48px;
  color: var(--text-muted);
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ==================== MODAL DATE RANGE ==================== */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}

.modal-overlay.show {
  opacity: 1;
  visibility: visible;
}

.modal-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 420px;
  padding: 28px;
  transform: translateY(20px) scale(0.95);
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

.modal-overlay.show .modal-box {
  transform: translateY(0) scale(1);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.modal-title {
  font-size: 20px;
  font-weight: 800;
  display: flex;
  align-items: center;
  gap: 10px;
}

.modal-close {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}

.modal-close:hover {
  background: var(--danger-soft);
  color: var(--danger);
  border-color: var(--danger);
}

.modal-body {
  margin-bottom: 24px;
}

.date-range-group {
  margin-bottom: 18px;
}

.date-range-label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-secondary);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.date-input-wrapper {
  position: relative;
}

.date-input-wrapper input {
  width: 100%;
  padding: 14px 16px;
  background: var(--bg-input);
  border: 2px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 15px;
  font-family: inherit;
  color: var(--text-primary);
  transition: all 0.25s ease;
  cursor: pointer;
}

.date-input-wrapper input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.15);
}

.date-input-wrapper input::-webkit-calendar-picker-indicator {
  filter: invert(1);
  opacity: 0.7;
  cursor: pointer;
}

.date-arrow {
  display: flex;
  justify-content: center;
  padding: 8px 0;
  color: var(--text-muted);
}

.quick-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}

.quick-filter-btn {
  padding: 8px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-input);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s ease;
}

.quick-filter-btn:hover {
  border-color: var(--primary);
  color: var(--primary-light);
}

.preview-section {
  background: var(--bg-input);
  border-radius: var(--radius-md);
  padding: 16px;
  margin-top: 16px;
}

.preview-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}

.preview-stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.preview-stat {
  text-align: center;
}

.preview-stat-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.preview-stat-value {
  font-size: 16px;
  font-weight: 800;
  color: var(--primary-light);
}

.modal-footer {
  display: flex;
  gap: 12px;
}

.btn-modal {
  flex: 1;
  padding: 14px 20px;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: none;
}

.btn-cancel {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-secondary);
}

.btn-cancel:hover {
  background: var(--bg-card-hover);
  color: var(--text-primary);
}

.btn-process {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  box-shadow: 0 6px 20px rgba(13, 148, 136, 0.35);
}

.btn-process:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(13, 148, 136, 0.45);
}

.btn-process:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

/* Danger soft for close button area */
.danger-soft { background: rgba(239, 68, 68, 0.1); }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 14px 24px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  font-size: 14px;
  box-shadow: var(--shadow-lg);
  z-index: 9999;
  opacity: 0;
  transition: all 0.35s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: var(--text-primary);
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* Print Styles */
@media print {
  body {
    background: white !important;
    color: black !important;
    padding: 20px;
  }
  
  body::before,
  .orb,
  .header-left .back-btn,
  .menu-container,
  .filter-section,
  .summary-bar,
  .modal-overlay {
    display: none !important;
  }
  
  .container { max-width: 100%; }
  
  .header { justify-content: center; padding-bottom: 20px; }
  
  .stats-grid {
    grid-template-columns: repeat(3, 1fr);
    break-inside: avoid;
  }
  
  .stat-card {
    border: 1px solid #ddd;
    background: #f9f9f9;
  }
  
  .transaction-list {
    max-height: none;
    border: 1px solid #ddd;
  }
  
  .transaction-item { break-inside: avoid; }
  
  * {
    color-adjust: exact !important;
    -webkit-print-color-adjust: exact !important;
  }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

@media (max-width: 520px) {
  body { padding: 10px; }
  
  .stats-grid {
    grid-template-columns: 1fr;
    gap: 10px;
  }
  
  .stat-card {
    display: flex;
    align-items: center;
    text-align: left;
    padding: 16px;
  }
  
  .stat-icon { margin: 0 16px 0 0; }
  .stat-label { margin-bottom: 4px; }
  
  .filter-section { justify-content: center; }
  
  .summary-bar {
    flex-direction: column;
    gap: 8px;
    text-align: center;
  }
  
  .transaction-item { flex-wrap: wrap; }
  
  .txn-amount {
    width: 100%;
    text-align: right;
    padding-top: 8px;
    border-top: 1px dashed var(--border);
  }
  
  .modal-box { padding: 20px; }
  
  .preview-stats { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div id="toast" class="toast"><span id="toastIcon"></span><span id="toastMessage"></span></div>

<!-- Modal Date Range -->
<div class="modal-overlay" id="dateRangeModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span id="modalTitle">Pilih Rentang Tanggal</span>
      </div>
      <button class="modal-close" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    
    <div class="modal-body">
      <div class="date-range-group">
        <label class="date-range-label">Tanggal Mulai</label>
        <div class="date-input-wrapper">
          <input type="date" id="startDate" class="form-control">
        </div>
      </div>
      
      <div class="date-arrow">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
      </div>
      
      <div class="date-range-group">
        <label class="date-range-label">Tanggal Akhir</label>

function getTodayString() {
  const now = new Date();
  return formatDateToString(now);
}

function formatDateToString(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function formatRupiah(angka) {
  return new Intl.NumberFormat('id-ID', {
    minimumFractionDigits: 0,
    maximumFractionDigits: 0
  }).format(angka);
}

function getServiceBadgeClass(service) {
  const map = {
    'Printer': 'badge-printer',
    'Komputer': 'badge-komputer',
    'Install': 'badge-install',
    'Lainnya': 'badge-lainnya'
  };
  return map[service] || 'badge-lainnya';
}

function formatDate(dateStr) {
  const [year, month, day] = dateStr.split('-');
  const date = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
  return {
    day: date.getDate(),
    month: date.toLocaleDateString('id-ID', { month: 'short' }),
    year: date.getFullYear()
  };
}

function isInRange(dateStr, range) {
  const date = new Date(dateStr + 'T00:00:00');
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  
  switch(range) {
    case 'today':
      return dateStr === getTodayString();
    case 'week': {
      const startOfWeek = new Date(now);
      startOfWeek.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1));
      return date >= startOfWeek;
    }
    case 'month':
      return date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();
    default:
      return true;
  }
}

// Filter by date range
function isInDateRange(dateStr, startDate, endDate) {
  return dateStr >= startDate && dateStr <= endDate;
}

// Get filtered data by date range
function getDataByDateRange(startDate, endDate) {
  return allData.filter(item => isInDateRange(item.tanggal, startDate, endDate));
}

// ==================== MENU & MODAL LOGIC ====================

  const btn = document.getElementById('menuBtn');

  menu.classList.toggle('show');

document.addEventListener('click', function(e) {
  if (!document.querySelector('.menu-container').contains(e.target)) {

    document.getElementById('dropdownMenu').classList.remove('show');

// Open Modal with action
window.openModal = function(action) {
  pendingAction = action;
  
  // Close dropdown first
  document.getElementById('menuBtn').classList.remove('active');
  document.getElementById('dropdownMenu').classList.remove('show');
  
  // Set modal title based on action
  const titles = {

window.closeModal = function() {

  pendingAction = null;
};

// Quick date presets
window.setQuickDate = function(preset) {
  const today = new Date();
  let start, end;
  
  switch(preset) {
    case 'today':
      start = end = today;
      break;
    case 'week':
      start = new Date(today);
      start.setDate(today.getDate() - today.getDay() + (today.getDay() === 0 ? -6 : 1));
      end = today;
      break;
    case 'month':
      start = new Date(today.getFullYear(), today.getMonth(), 1);
      end = today;
      break;
    case 'lastMonth':
      start = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      end = new Date(today.getFullYear(), today.getMonth(), 0);
      break;
    case 'all':
      if (allData.length > 0) {
        const dates = allData.map(d => d.tanggal).sort();
        start = new Date(dates[0] + 'T00:00:00');
        end = new Date(dates[dates.length - 1] + 'T00:00:00');
      } else {
        start = end = today;
      }
      break;
    default:
      start = end = today;
  }
  
  document.getElementById('startDate').value = formatDateToString(start);
  document.getElementById('endDate').value = formatDateToString(end);
  
  updatePreview();
};

// Update preview in modal
function updatePreview() {
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;
  
  if (!startDate || !endDate) {
    document.getElementById('previewCount').textContent = '0';
    document.getElementById('previewTotal').textContent = 'Rp 0';
    return;
  }
  
  const filtered = getDataByDateRange(startDate, endDate);
  const total = filtered.reduce((sum, item) => sum + item.biaya, 0);
  
  document.getElementById('previewCount').textContent = filtered.length;
  document.getElementById('previewTotal').textContent = `Rp ${formatRupiah(total)}`;
}

// Listen to date changes
document.getElementById('startDate').addEventListener('change', updatePreview);
document.getElementById('endDate').addEventListener('change', updatePreview);

// Process the action after date selection
window.processAction = async function() {
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;
  
  if (!startDate || !endDate) {
    showToast('Mohon pilih tanggal mulai dan akhir!', 'error');
    return;
  }
  
  if (startDate > endDate) {
    showToast('Tanggal mulai tidak boleh lebih besar dari tanggal akhir!', 'error');
    return;
  }
  
  const filtered = getDataByDateRange(startDate, endDate);
  
  if (filtered.length === 0) {
    showToast('Tidak ada data pada rentang tanggal ini!', 'error');
    return;
  }
  
  // Close modal
  closeModal();
  
  // Execute the pending action
  switch(pendingAction) {
    case 'print':
      await executePrint(filtered, startDate, endDate);
      break;
    case 'share':
      await executeShare(filtered, startDate, endDate);
      break;
    case 'export-csv':
      await executeExportCSV(filtered, startDate, endDate);
      break;
    case 'export-json':
      await executeExportJSON(filtered, startDate, endDate);
      break;
  }
};

// ==================== ACTION EXECUTORS ====================

async function executeExportCSV(data, startDate, endDate) {
  const headers = ['No', 'Tanggal', 'Nama Pelanggan', 'Jenis Service', 'Keterangan', 'Biaya (Rp)'];
  const rows = data.map((item, i) => [
    i + 1,
    item.tanggal,
    item.nama,
    item.service,
    item.keterangan || '-',
    item.biaya
  ]);
  
  const content = [headers, ...rows].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
  const filename = `laporan-teknisi-${startDate}_to_${endDate}.csv`;

  downloadFile(content, filename, 'application/json');
  showToast(`File "${filename}" berhasil didownload!`, 'success');

// Helper: Format date to Indonesian
function formatDateID(dateStr) {
  const [year, month, day] = dateStr.split('-');
  const date = new Date(parseInt(year), parseInt(month) - 1, parseInt(day));
  return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
}

// Helper: Copy to clipboard
function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    showToast('Laporan berhasil disalin ke clipboard!', 'success');
  }).catch(() => {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    showToast('Laporan berhasil disalin!', 'success');
  });
}

// Helper: Download file
function downloadFile(content, filename, type) {
  const blob = new Blob(['\ufeff' + content], { type: type + ';charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  link.style.display = 'none';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

// Toast notification
window.showToast = function(message, type = 'success') {
  const toast = document.getElementById('toast');
  const icon = type === 'success' ? '✅' : '❌';
  toast.innerHTML = `<span>${icon}</span><span>${message}</span>`;
  toast.style.borderColor = type === 'success' ? 'var(--success)' : 'var(--danger)';
  toast.classList.add('show');
  toast.style.transform = 'translateX(-50%) translateY(0)';
  toast.style.opacity = '1';
  
  setTimeout(() => {
    toast.style.transform = 'translateX(-50%) translateY(100px)';
    toast.style.opacity = '0';
  }, 3000);
};

// Set Filter
window.setFilter = function(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === filter);
  });
  renderList();
};

function renderList() {
  const filteredData = allData.filter(item => isInRange(item.tanggal, currentFilter));
  const total = filteredData.reduce((sum, item) => sum + item.biaya, 0);
  
  document.getElementById('showCount').textContent = filteredData.length;
  document.getElementById('summaryTotal').textContent = `Total: Rp ${formatRupiah(total)}`;
  
  filteredData.sort((a, b) => b.tanggal.localeCompare(a.tanggal));
  
  const container = document.getElementById('transactionList');
  
  if (filteredData.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><p>Tidak ada transaksi untuk periode ini</p></div>`;
    return;
  }
  
  let html = '';
  filteredData.forEach((item, index) => {
    const namaService = item.service === 'Lainnya' ? (item.keterangan || 'Lainnya') : item.service;
    const dateInfo = formatDate(item.tanggal);
    
    html += `
      <div class="transaction-item" style="animation-delay: ${Math.min(index * 0.03, 0.3)}s">
        <div class="txn-date">
          <div class="txn-day">${dateInfo.day}</div>
          <div class="txn-month">${dateInfo.month}</div>
        </div>
        <div class="txn-info">
          <div class="txn-name">${item.nama}</div>
          <div class="txn-service">
            <span class="service-badge ${getServiceBadgeClass(item.service)}">${namaService}</span>
          </div>
        </div>
        <div class="txn-amount">Rp ${formatRupiah(item.biaya)}</div>
      </div>
    `;
  });
  
  container.innerHTML = html;
}

async function loadReport() {
  try {
    const querySnapshot = await getDocs(collection(db, "data"));
    
    allData = [];
    let totalToday = 0, totalWeek = 0, totalMonth = 0;
    
    const now = new Date();
    const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const startOfWeek = new Date(now);
    startOfWeek.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1));
    startOfWeek.setHours(0, 0, 0, 0);
    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
    
    querySnapshot.forEach((docSnap) => {
      const d = docSnap.data();
      allData.push({
        nama: d.nama,
        service: d.service,
        keterangan: d.keterangan,
        biaya: d.biaya,
        tanggal: d.tanggal
      });
      
      const tanggal = new Date(d.tanggal + 'T00:00:00');
      if (tanggal >= startOfDay && d.tanggal === getTodayString()) totalToday += d.biaya;
      if (tanggal >= startOfWeek) totalWeek += d.biaya;
      if (tanggal >= startOfMonth) totalMonth += d.biaya;
    });
    
    document.getElementById('statToday').textContent = `Rp ${formatRupiah(totalToday)}`;
    document.getElementById('statWeek').textContent = `Rp ${formatRupiah(totalWeek)}`;
    document.getElementById('statMonth').textContent = `Rp ${formatRupiah(totalMonth)}`;
    document.getElementById('totalCount').textContent = `${allData.length} total`;
    
    renderList();
    
  } catch (error) {
    console.error('Error:', error);
    document.getElementById('transactionList').innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><p>Gagal memuat data</p></div>`;
  }
}

loadReport();

// Close modal on overlay click
document.getElementById('dateRangeModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Close modal on Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});
